<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── SEO & OGP ── -->
  <title>PDF マージャー — 複数のPDFを無料で結合</title>
  <meta name="description" content="複数のPDFファイルをブラウザ上で無料・安全に結合できるツール。ファイルはサーバーに送信されません。">
  <meta name="keywords" content="PDF, 結合, マージ, 無料, オンライン, ブラウザ">
  <meta name="author" content="">
  <meta property="og:title" content="PDF マージャー — 複数のPDFを無料で結合">
  <meta property="og:description" content="複数のPDFファイルをブラウザ上で無料・安全に結合。ファイルはサーバーに送信されません。">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="PDF マージャー">
  <meta name="twitter:description" content="複数のPDFをブラウザで無料結合。サーバー不要・完全ローカル処理。">

  <!-- ── Favicon (SVG inline) ── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">

  <!-- ── pdf-lib (CDN) ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Design tokens
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      --bg:       #0f0f13;
      --surface:  #1a1a22;
      --surface2: #22222e;
      --border:   #2e2e3e;
      --accent:   #6c63ff;
      --accent2:  #ff6584;
      --text:     #e8e8f0;
      --muted:    #888899;
      --success:  #4ade80;
      --radius:   14px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Reset & base
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Header
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    header { text-align: center; margin-bottom: 40px; }
    .icon-wrap { font-size: 52px; line-height: 1; margin-bottom: 12px; display: block; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: .02em; }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: .9rem; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Card
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 20px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Drop zone
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,.07);
    }
    #drop-zone .dz-icon { font-size: 40px; margin-bottom: 10px; display: block; }
    #drop-zone p { color: var(--muted); font-size: .9rem; line-height: 1.6; }
    #drop-zone strong { color: var(--text); }
    #file-input, #file-input2 { display: none; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       File list
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #file-list { display: flex; flex-direction: column; gap: 10px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: grab;
      user-select: none;
      transition: opacity .2s, transform .15s;
    }
    .file-item.dragging   { opacity: .4; }
    .file-item.drag-target { transform: scale(1.015); border-color: var(--accent); }

    .file-item .num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; flex-shrink: 0;
    }
    .file-item .file-icon { font-size: 22px; flex-shrink: 0; }
    .file-item .file-name {
      flex: 1; font-size: .9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-item .file-size { font-size: .78rem; color: var(--muted); flex-shrink: 0; }
    .file-item .btn-remove {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 0 4px;
      line-height: 1; transition: color .15s; flex-shrink: 0;
    }
    .file-item .btn-remove:hover { color: var(--accent2); }

    .drag-hint { font-size: .75rem; color: var(--muted); text-align: center; margin-top: 8px; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Inputs
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .label { font-size: .82rem; color: var(--muted); margin-bottom: 8px; display: block; }
    .input-group { display: flex; gap: 8px; align-items: center; }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .ext-label { color: var(--muted); font-size: .9rem; flex-shrink: 0; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Buttons
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .btn-primary {
      width: 100%; padding: 16px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s;
      letter-spacing: .04em;
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .btn-secondary {
      padding: 8px 16px;
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: .85rem; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

    #add-more-btn {
      width: 100%; padding: 12px;
      background: transparent; color: var(--accent);
      border: 1px dashed var(--accent); border-radius: 10px;
      font-size: .88rem; cursor: pointer;
      transition: background .2s; margin-top: 4px;
    }
    #add-more-btn:hover { background: rgba(108,99,255,.08); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Progress
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #progress-wrap {
      display: none; width: 100%; height: 4px;
      background: var(--border); border-radius: 2px;
      overflow: hidden; margin-top: 10px;
    }
    #progress-wrap.show { display: block; }
    #progress-bar {
      height: 100%; width: 0%;
      background: var(--accent); border-radius: 2px;
      transition: width .3s;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Status & Result
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #status {
      margin-top: 12px; font-size: .85rem;
      color: var(--muted); text-align: center; min-height: 20px;
    }

    #result-card { display: none; flex-direction: column; align-items: center; gap: 14px; }
    #result-card.show { display: flex; }
    #result-card .check { font-size: 36px; }
    #result-card p { color: var(--muted); font-size: .9rem; }

    #download-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 32px;
      background: var(--success); color: #0f0f13;
      border: none; border-radius: var(--radius);
      font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
      text-decoration: none;
    }
    #download-btn:hover { opacity: .85; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Misc
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
    .list-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px;
    }
    .list-header span { font-weight: 700; font-size: .95rem; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━
       Footer
    ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
      line-height: 1.8;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <span class="icon-wrap">🔗</span>
  <h1>PDF <span>マージャー</span></h1>
  <p class="subtitle">複数のPDFを順番通りに結合する高度なツール</p>
</header>

<!-- ── Drop zone ── -->
<div class="card">
  <div id="drop-zone">
    <span class="dz-icon">📄</span>
    <p><strong>ここにPDFをドロップ</strong><br>またはクリックしてファイルを選択</p>
    <input type="file" id="file-input" accept="application/pdf" multiple>
  </div>
</div>

<!-- ── File list ── -->
<div class="card" id="list-card" style="display:none;">
  <div class="list-header">
    <span>📋 結合するファイル</span>
    <button class="btn-secondary" id="clear-btn">クリア</button>
  </div>
  <div id="file-list"></div>
  <p class="drag-hint">↕️ ドラッグして順番を並び替えられます</p>
  <hr class="divider" style="margin:16px 0;">
  <button id="add-more-btn">＋ PDFをさらに追加</button>
  <input type="file" id="file-input2" accept="application/pdf" multiple>
</div>

<!-- ── Output settings ── -->
<div class="card" id="settings-card" style="display:none;">
  <label class="label" for="output-name">出力ファイル名</label>
  <div class="input-group">
    <input type="text" id="output-name" value="merged" placeholder="merged">
    <span class="ext-label">.pdf</span>
  </div>
</div>

<!-- ── Merge button ── -->
<div id="merge-wrap" style="display:none;width:100%;max-width:680px;margin-bottom:16px;">
  <button class="btn-primary" id="merge-btn" disabled>🔗 PDFを結合実行</button>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status" role="status" aria-live="polite"></div>
</div>

<!-- ── Result ── -->
<div class="card" id="result-card" role="region" aria-label="結合結果">
  <span class="check">✅</span>
  <p>結合完了！ダウンロードしてください。</p>
  <a id="download-btn" href="#" download>📥 結合PDFをダウンロード</a>
</div>

<!-- ── Footer ── -->
<footer>
  <p>🔒 すべての処理はブラウザ内で完結します。ファイルはサーバーに送信されません。</p>
  <p style="margin-top:4px;">Powered by <a href="https://pdf-lib.js.org/" target="_blank" rel="noopener">pdf-lib</a></p>
</footer>

<script>
  'use strict';

  /* ── State ── */
  let files = [];          // Array<{ file: File, name: string }>
  let dragSrcIndex = null; // index of item being dragged (list reorder)

  /* ── Element refs ── */
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const fileInput2  = document.getElementById('file-input2');
  const fileListEl  = document.getElementById('file-list');
  const listCard    = document.getElementById('list-card');
  const settingsCard= document.getElementById('settings-card');
  const mergeWrap   = document.getElementById('merge-wrap');
  const mergeBtn    = document.getElementById('merge-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const addMoreBtn  = document.getElementById('add-more-btn');
  const outputName  = document.getElementById('output-name');
  const statusEl    = document.getElementById('status');
  const resultCard  = document.getElementById('result-card');
  const downloadBtn = document.getElementById('download-btn');
  const progressWrap= document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');

  /* ── Drop zone ── */
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });
  fileInput2.addEventListener('change', () => {
    addFiles([...fileInput2.files]);
    fileInput2.value = '';
  });

  addMoreBtn.addEventListener('click', () => fileInput2.click());

  clearBtn.addEventListener('click', () => {
    files = [];
    renderList();
    updateUI();
    resultCard.classList.remove('show');
    downloadBtn.href = '#';
  });

  /* ── Add files ── */
  function addFiles(newFiles) {
    const pdfs = newFiles.filter(
      f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')
    );
    if (!pdfs.length) {
      alert('PDFファイルのみ対応しています。');
      return;
    }
    pdfs.forEach(f => files.push({ file: f, name: f.name }));
    renderList();
    updateUI();
  }

  /* ── Render file list ── */
  function renderList() {
    fileListEl.innerHTML = '';
    files.forEach((item, i) => {
      const div = document.createElement('div');
      div.className   = 'file-item';
      div.draggable   = true;
      div.dataset.idx = i;

      div.innerHTML = `
        <div class="num">${i + 1}</div>
        <span class="file-icon">📄</span>
        <span class="file-name" title="${escHtml(item.name)}">${escHtml(item.name)}</span>
        <span class="file-size">${formatSize(item.file.size)}</span>
        <button class="btn-remove" aria-label="削除">✕</button>
      `;

      /* list reorder drag */
      div.addEventListener('dragstart', e => {
        dragSrcIndex = i;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => div.classList.add('dragging'), 0);
      });
      div.addEventListener('dragend', () => div.classList.remove('dragging'));
      div.addEventListener('dragover', e => {
        e.preventDefault();
        document.querySelectorAll('.file-item')
          .forEach(el => el.classList.remove('drag-target'));
        div.classList.add('drag-target');
      });
      div.addEventListener('dragleave', () => div.classList.remove('drag-target'));
      div.addEventListener('drop', e => {
        e.preventDefault();
        div.classList.remove('drag-target');
        if (dragSrcIndex !== null && dragSrcIndex !== i) {
          const [moved] = files.splice(dragSrcIndex, 1);
          files.splice(i, 0, moved);
          dragSrcIndex = null;
          renderList();
        }
      });

      /* remove */
      div.querySelector('.btn-remove').addEventListener('click', () => {
        files.splice(i, 1);
        renderList();
        updateUI();
      });

      fileListEl.appendChild(div);
    });
  }

  /* ── UI state sync ── */
  function updateUI() {
    const has = files.length > 0;
    listCard.style.display      = has ? 'block' : 'none';
    settingsCard.style.display  = has ? 'block' : 'none';
    mergeWrap.style.display     = has ? 'block' : 'none';
    mergeBtn.disabled           = files.length < 2;
    statusEl.textContent        = files.length === 1
      ? '⚠️ 結合には2つ以上のPDFが必要です。'
      : '';
  }

  /* ── Merge ── */
  mergeBtn.addEventListener('click', async () => {
    if (files.length < 2) return;

    mergeBtn.disabled = true;
    statusEl.textContent = '結合中...';
    progressWrap.classList.add('show');
    progressBar.style.width = '0%';
    resultCard.classList.remove('show');

    try {
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.create();

      for (let i = 0; i < files.length; i++) {
        const buf   = await files[i].file.arrayBuffer();
        const src   = await PDFDocument.load(buf);
        const pages = await merged.copyPages(src, src.getPageIndices());
        pages.forEach(p => merged.addPage(p));
        progressBar.style.width =
          `${Math.round(((i + 1) / files.length) * 90)}%`;
      }

      const outBytes = await merged.save();
      progressBar.style.width = '100%';

      const blob = new Blob([outBytes], { type: 'application/pdf' });
      const url  = URL.createObjectURL(blob);
      const name = (outputName.value.trim() || 'merged') + '.pdf';

      downloadBtn.href     = url;
      downloadBtn.download = name;
      resultCard.classList.add('show');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      statusEl.textContent =
        `✅ 結合完了 — ${files.length} ファイル / ${formatSize(outBytes.byteLength)}`;
    } catch (err) {
      statusEl.textContent = '❌ エラーが発生しました: ' + err.message;
      console.error(err);
    } finally {
      mergeBtn.disabled = false;
      setTimeout(() => {
        progressWrap.classList.remove('show');
        progressBar.style.width = '0%';
      }, 1400);
    }
  });

  /* ── Helpers ── */
  function formatSize(bytes) {
    if (bytes < 1024)        return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(2) + ' MB';
  }

  function escHtml(str) {
    return str.replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
    );
  }
</script>
</body>
</html>
